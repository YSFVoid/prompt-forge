version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: prompt-forge-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: prompt-forge
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: prompt-forge-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - PUBLIC_MODE=true
      - MONGODB_URI=mongodb://mongodb:27017/prompt-forge
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ADMIN_KEY=${ADMIN_KEY}
      - ENGINE_URL=http://engine:8080
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3001/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Web Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: prompt-forge-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api

  # C++ Inference Engine
  engine:
    build:
      context: ./apps/engine
      dockerfile: Dockerfile
    container_name: prompt-forge-engine
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - artifacts_data:/app/artifacts
    environment:
      - PORT=8080
      - ARTIFACTS_PATH=/app/artifacts
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python Trainer
  trainer:
    build:
      context: ./apps/trainer
      dockerfile: Dockerfile
    container_name: prompt-forge-trainer
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - artifacts_data:/app/artifacts
    environment:
      - PORT=8000
      - MONGODB_URI=mongodb://mongodb:27017/prompt-forge
      - ARTIFACTS_PATH=/app/artifacts
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
  artifacts_data:
